# ── 前端：photo-share.cwc329.com ─────────────────────────────
server {
    listen 80;
    server_name photo-share.cwc329.com localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Vue Router history mode — 所有路徑都回傳 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
