[tool.yapf]
based_on_style = "pep8"
column_limit = 100
blank_line_before_nested_class_or_def = true
split_before_logical_operator = true

[tool.isort]
line_length = 100
src_paths = ["."]
known_first_party = ["config", "database", "models", "routers", "services"]
skip_gitignore = true
skip = [".venv", "venv", "__pycache__"]
